name: Generate Advanced Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Generate Advanced Snake.svg
        uses: Platane/snk@v2
        with:
          github_user_name: <your-github-username>
          outputs: dist/snake_advanced.svg
          color_snake: "#FF6347"
          color_dots: "#FFD700"
          color_background: "#1E90FF"
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/snake_advanced.svg
          git commit -m 'Generate advanced snake.svg'
          git push
